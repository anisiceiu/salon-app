<div>
    <form id="serviceForm" [formGroup]="serviceForm" (ngSubmit)="onSubmit()">
        <div class="row mb-3">
            <div class="col-md-8">
                <label class="form-label-custom">Service Name</label>
                <input formControlName="name" type="text" class="form-control form-control-custom" placeholder="Enter service name" required>
            </div>
            <div class="col-md-4">
                <label class="form-label-custom">Category</label>
                <select formControlName="categoryId" class="form-select form-control-custom">
                    @for(category of categories();track category.id)
                    {
                        <option value="{{category.id}}">{{category.name}}</option>
                    }
                    
                </select>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label-custom">Price ($)</label>
                <input formControlName="price" type="number" class="form-control form-control-custom" placeholder="0.00" required>
            </div>
            <div class="col-md-6">
                <label class="form-label-custom">Duration (minutes)</label>
                <input formControlName="duration" type="number" class="form-control form-control-custom" placeholder="30" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label-custom">Description</label>
            <textarea formControlName="description" class="form-control form-control-custom" rows="3"
                placeholder="Describe the service..."></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label-custom">Service Image URL</label>
            <input formControlName="imageUrl" type="url" class="form-control form-control-custom" placeholder="https://example.com/image.jpg">
        </div>
        <div class="mb-3">
            <label class="form-label-custom">Status</label>
            <div class="form-check">
                <input formControlName="isActive" class="form-check-input" type="checkbox" id="serviceActive" checked>
                <label class="form-check-label" for="serviceActive">
                    Service is active and available for booking
                </label>
            </div>
        </div>
        <div>
            <button type="submit" class="btn btn-primary-custom">
                <i class="fas fa-save me-2"></i>Save Service
            </button>
        </div>
    </form>
</div>

<div class="auth-container">
        <div class="auth-card">
            <div class="card-header">
                <a href="index.html" class="text-white text-decoration-none">
                    <i class="fas fa-spa me-2"></i>Luxe Salon
                </a>
            </div>
            <div class="card-body">
                <h4 class="text-center mb-4">Welcome Back</h4>
                <form id="loginForm" [formGroup]="loginForm" (ngSubmit)="login()">
                    <div class="mb-3">
                        <label class="form-label-custom">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="fas fa-envelope text-muted"></i>
                            </span>
                            <input type="email" formControlName="email" class="form-control form-control-custom" placeholder="Enter your email" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label-custom">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="fas fa-lock text-muted"></i>
                            </span>
                            <input type="password" formControlName="password" class="form-control form-control-custom" placeholder="Enter your password" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">Remember me</label>
                        </div>
                        <a href="#" class="text-primary-custom">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100 mb-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </form>
                
                <div class="auth-divider">
                    <span>or continue with</span>
                </div>
                
                <div class="d-flex gap-3 mb-4">
                    <button class="btn btn-outline-secondary flex-fill">
                        <i class="fab fa-google me-2"></i>Google
                    </button>
                    <button class="btn btn-outline-secondary flex-fill">
                        <i class="fab fa-facebook me-2"></i>Facebook
                    </button>
                </div>
                
                <p class="text-center mb-0">
                    Don't have an account? 
                    <a routerLink="/customer-register" class="text-primary-custom fw-bold">Register now</a>
                </p>
            </div>
        </div>
    </div>

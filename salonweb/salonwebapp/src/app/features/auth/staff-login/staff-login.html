<div class="auth-container">
        <div class="auth-card">
            <div class="card-header">
                <a href="index.html" class="text-white text-decoration-none">
                    <i class="fas fa-spa me-2"></i>Luxe Salon
                </a>
            </div>
            <div class="card-body">
                <div class="text-center mb-4">
                    <i class="fas fa-user-tie text-primary-custom" style="font-size: 3rem;"></i>
                    <h4 class="mt-3">Staff Portal</h4>
                    <p class="text-muted">Login to manage your schedule</p>
                </div>
                <form id="staffLoginForm">
                    <div class="mb-3">
                        <label class="form-label-custom">Employee ID</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="fas fa-id-card text-muted"></i>
                            </span>
                            <input type="text" class="form-control form-control-custom" placeholder="Enter your employee ID" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label-custom">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="fas fa-lock text-muted"></i>
                            </span>
                            <input type="password" class="form-control form-control-custom" placeholder="Enter your password" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="rememberStaff">
                        <label class="form-check-label" for="rememberStaff">Remember me</label>
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100 mb-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </form>
                
                <p class="text-center mb-0">
                    <a routerLink="/home" class="text-primary-custom">
                        <i class="fas fa-arrow-left me-1"></i>Back to Home
                    </a>
                </p>
            </div>
        </div>
    </div>

 <div class="auth-container">
        <div class="auth-card">
            <div class="card-header">
                <a href="index.html" class="text-white text-decoration-none">
                    <i class="fas fa-spa me-2"></i>Luxe Salon
                </a>
            </div>
            <div class="card-body">
                <h4 class="text-center mb-4">Create Account</h4>
                <form id="registerForm" [formGroup]="registerForm" (ngSubmit)="register()">
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label-custom">Full Name</label>
                            <input type="text" formControlName="fullName" class="form-control form-control-custom" placeholder="Full name" required>
                        </div>
                    </div>
                    <div class="mb-3 mt-3">
                        <label class="form-label-custom">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="fas fa-envelope text-muted"></i>
                            </span>
                            <input formControlName="email" type="email" class="form-control form-control-custom" placeholder="Enter your email" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label-custom">Phone Number</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="fas fa-phone text-muted"></i>
                            </span>
                            <input formControlName="phone" type="tel" class="form-control form-control-custom" placeholder="(555) 123-4567" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label-custom">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="fas fa-lock text-muted"></i>
                            </span>
                            <input formControlName="password" type="password" class="form-control form-control-custom" placeholder="Create a password" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <small class="text-muted">At least 2 characters</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label-custom">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="fas fa-lock text-muted"></i>
                            </span>
                            <input type="password" formControlName="confirmPassword" class="form-control form-control-custom" placeholder="Confirm your password" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="agreeTerms" required>
                            <label class="form-check-label" for="agreeTerms">
                                I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                            </label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100 mb-3">
                        <i class="fas fa-user-plus me-2"></i>Create Account
                    </button>
                </form>
                
                <!-- <div class="auth-divider">
                    <span>or continue with</span>
                </div>
                
                <div class="d-flex gap-3 mb-4">
                    <button class="btn btn-outline-secondary flex-fill">
                        <i class="fab fa-google me-2"></i>Google
                    </button>
                    <button class="btn btn-outline-secondary flex-fill">
                        <i class="fab fa-facebook me-2"></i>Facebook
                    </button>
                </div> -->
                
                <p class="text-center mb-0">
                    Already have an account? 
                    <a routerLink="/customer-login" class="text-primary-custom fw-bold">Login here</a>
                </p>
            </div>
        </div>
    </div>
